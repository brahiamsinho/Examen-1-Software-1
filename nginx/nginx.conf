# =============================================================
# Nginx - Reverse Proxy Principal
# Proxies:
#   /           → Angular frontend
#   /backend/   → Spring Boot (puerto 8080)
#   /fastapi/   → FastAPI microservice (puerto 8000)
# =============================================================

upstream angular {
    server frontend:80;
}

upstream springboot {
    server backend:8080;
}

upstream fastapi {
    server fastapi:8000;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Normaliza prefijos sin barra final
    location = /backend {
        return 308 /backend/;
    }
    location = /fastapi {
        return 308 /fastapi/;
    }

    # -------------------------
    # Frontend Angular
    # -------------------------
    location / {
        proxy_pass http://angular;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------
    # Spring Boot Backend
    # -------------------------
    location /backend/ {
        rewrite ^/backend/(.*)$ /$1 break;
        proxy_pass http://springboot;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /backend;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout                 3600s;
        proxy_send_timeout                 3600s;
    }

    # -------------------------
    # FastAPI Microservice
    # -------------------------
    location /fastapi/ {
        rewrite ^/fastapi/(.*)$ /$1 break;
        proxy_pass http://fastapi;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /fastapi;
    }

    # -------------------------
    # Nginx health check
    # -------------------------
    location /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"UP","service":"nginx-proxy"}';
    }
}
