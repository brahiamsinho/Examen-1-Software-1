<section class="bpmn-page" aria-labelledby="bpmn-title">
  <header class="admin-page-head">
    <p class="admin-page-kicker">Modelado BPMN</p>
    <h2 id="bpmn-title" class="admin-page-title">Editor BPMN de políticas</h2>
    <p class="admin-page-lead">
      Modelador BPMN de políticas con carriles por departamento, asignación de responsable y vínculo de formulario HTTPS
      por nodo.
      <a routerLink="/disenador/politicas" class="bpmn-inline-link">Volver al catálogo</a>
    </p>
  </header>

  @if (bannerMsg) {
    <p class="bpmn-banner" role="status" [class.bpmn-banner--error]="bannerKind === 'error'">{{ bannerMsg }}</p>
  }

  @if (politica) {
    <div class="admin-panel bpmn-meta">
      <h3 class="admin-panel-title">Cabecera de política</h3>
      <div class="admin-form-grid">
        <label class="admin-field">
          <span>Nombre</span>
          <input type="text" [(ngModel)]="metaNombre" maxlength="200" />
        </label>
        <label class="admin-field">
          <span>Versión</span>
          <input type="number" [(ngModel)]="metaVersion" min="1" />
        </label>
        <label class="admin-field">
          <span>Estado</span>
          <select [(ngModel)]="metaEstado">
            <option value="BORRADOR">BORRADOR</option>
            <option value="PUBLICADA">PUBLICADA</option>
            <option value="INACTIVA">INACTIVA</option>
          </select>
        </label>
        <label class="admin-field bpmn-desc">
          <span>Descripción</span>
          <textarea [(ngModel)]="metaDescripcion" rows="2" maxlength="4000"></textarea>
        </label>
      </div>
    </div>
  }

  <app-bpmn-toolbar
    [saving]="saving"
    (newRequested)="onNewDiagram()"
    (lanesRequested)="onSyncLanesByDepartment()"
    (importRequested)="onImportRequest()"
    (exportRequested)="onExportXml()"
    (validateRequested)="onValidate()"
    (saveRequested)="onSave()"
  />

  <input #xmlInput type="file" accept=".bpmn,.xml,text/xml,application/xml" hidden (change)="onFilePicked($event)" />

  <div class="bpmn-layout">
    <div class="bpmn-canvas-card">
      <div #bpmnCanvas class="bpmn-canvas" role="application" aria-label="Canvas BPMN"></div>
    </div>

    <div class="bpmn-side">
      <app-bpmn-properties-panel
        [selectedElementLabel]="selectedElementLabel"
        [isTaskLikeSelected]="isTaskLikeSelected"
        [areas]="areas"
        [usuariosDelArea]="usuariosDelArea"
        [props]="props"
        (areaChanged)="onPropsAreaChanged($event)"
        (apply)="onApplyProps($event)"
      />
      <app-bpmn-validation-panel [issues]="validationIssues" />
    </div>
  </div>
</section>
