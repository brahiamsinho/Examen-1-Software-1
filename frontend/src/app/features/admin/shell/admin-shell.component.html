<div class="admin-app">
  <aside class="admin-sidebar" aria-label="Navegación de administración">
    <div class="admin-sidebar-brand">
      <span class="admin-sidebar-logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M4 6h16v12H4V6zm2 2v8h12V8H6zm2 2h8v2H8v-2zm0 3h5v2H8v-2z"
            fill="currentColor"
          />
        </svg>
      </span>
      <div class="admin-sidebar-titles">
        <span class="admin-sidebar-kicker">Administración</span>
        <span class="admin-sidebar-title">Trámites</span>
      </div>
    </div>

    <nav class="admin-nav">
      <a routerLink="/admin/resumen" routerLinkActive="is-active" class="admin-nav-item">
        <span class="admin-nav-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 10.5 12 3l9 7.5V21H3v-10.5z" stroke-linejoin="round" />
          </svg>
        </span>
        Resumen
      </a>
      <a routerLink="/admin/usuarios" routerLinkActive="is-active" class="admin-nav-item">
        <span class="admin-nav-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 11a4 4 0 1 0-8 0 4 4 0 0 0 8 0z" />
            <path d="M4 20a8 8 0 0 1 16 0" stroke-linecap="round" />
          </svg>
        </span>
        Usuarios
      </a>
      <a routerLink="/admin/roles" routerLinkActive="is-active" class="admin-nav-item">
        <span class="admin-nav-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2l2.4 7.4H22l-6 4.6 2.3 7L12 17.8 5.7 21l2.3-7-6-4.6h7.6L12 2z" stroke-linejoin="round" />
          </svg>
        </span>
        Roles
      </a>
      <a routerLink="/admin/permisos" routerLinkActive="is-active" class="admin-nav-item">
        <span class="admin-nav-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 3v18M5 8h14M7 14h10" stroke-linecap="round" />
          </svg>
        </span>
        Permisos
      </a>
      <a routerLink="/admin/bitacora" routerLinkActive="is-active" class="admin-nav-item">
        <span class="admin-nav-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 4h12v16H6V4zm2 2v12h8V6H8zm1 2h6v2H9V8zm0 3h6v2H9v-2zm0 3h4v2H9v-2z" stroke-linejoin="round" />
          </svg>
        </span>
        Bitácora
      </a>
    </nav>

    <a routerLink="/dashboard" class="admin-sidebar-footer">Volver al portal</a>
  </aside>

  <div class="admin-main-col">
    <header class="admin-topbar">
      <div class="admin-topbar-text">
        <h1 class="admin-topbar-title">Panel de administración</h1>
        <p class="admin-topbar-sub">
          @if (auth.getCorreo(); as c) {
            <span>Sesión: {{ c }}</span>
          } @else {
            <span>Sesión activa</span>
          }
        </p>
      </div>
      <button type="button" class="admin-btn admin-btn-ghost" (click)="auth.logout()">Cerrar sesión</button>
    </header>

    <main class="admin-content">
      <router-outlet />
    </main>
  </div>
</div>
