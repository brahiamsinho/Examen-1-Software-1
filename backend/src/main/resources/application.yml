server:
  address: 0.0.0.0
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: tramites-backend

  servlet:
    multipart:
      max-file-size: ${APP_UPLOAD_MAX_FILE_SIZE:25MB}
      max-request-size: ${APP_UPLOAD_MAX_REQUEST_SIZE:30MB}

  data:
    mongodb:
      # Colecciones alineadas con script.db / init-mongo.js. El nombre de BD lo define MONGO_DB en Docker (p. ej. tramitesdb);
      # el archivo script.db de referencia usa el ejemplo "gestion_tramites" — mantener URI coherente con el despliegue.
      uri: ${MONGODB_URI:mongodb://mongo:27017/tramitesdb}

  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}

# Integración con microservicio FastAPI (IA / analítica avanzada)
integrations:
  fastapi:
    base-url: ${FASTAPI_BASE_URL:http://fastapi:8000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.plataforma.tramites: DEBUG
    org.springframework: INFO

# JWT y CORS (ajustar JWT_SECRET en producción; mínimo 32 caracteres)
app:
  security:
    jwt-secret: ${JWT_SECRET:cambia-esto-en-produccion-minimo-32-bytes!!}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  dev:
    auth-seed-enabled: ${APP_DEV_AUTH_SEED_ENABLED:true}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}
  workflow:
    intake-node-id: ${APP_WORKFLOW_INTAKE_NODE_ID:ATENCION_CLIENTE}
    intake-node-name: ${APP_WORKFLOW_INTAKE_NODE_NAME:Atencion al cliente}
    intake-area-id: ${APP_WORKFLOW_INTAKE_AREA_ID:}
  storage:
    upload-dir: ${APP_UPLOAD_DIR:./data/uploads}
  firebase:
    credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
