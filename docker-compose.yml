# =============================================================
# Plataforma de Trámites - Docker Compose (desarrollo local)
# Servicios: nginx | frontend | backend | fastapi | mongo | redis
#
# Uso: copia .env.example -> .env y ejecuta: docker compose up -d --build
# =============================================================

networks:
  tramites-net:
    driver: bridge

volumes:
  mongo-data:
  redis-data:
  ml-models:

services:

  # ─── Nginx Reverse Proxy ─────────────────────────────────
  nginx:
    container_name: tramites-nginx
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      fastapi:
        condition: service_healthy
    networks:
      - tramites-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Angular Frontend ─────────────────────────────────────
  frontend:
    container_name: tramites-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - tramites-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── Spring Boot Backend ──────────────────────────────────
  backend:
    container_name: tramites-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      # Puerto fijo en la red Docker: debe coincidir con nginx/nginx.conf (upstream springboot).
      SERVER_PORT: "8080"
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/${MONGO_DB:-tramitesdb}}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      FASTAPI_BASE_URL: ${FASTAPI_BASE_URL:-http://fastapi:8000}
      JWT_SECRET: ${JWT_SECRET:-cambia-esto-en-produccion-minimo-32-bytes!!}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-120}
      APP_DEV_AUTH_SEED_ENABLED: ${APP_DEV_AUTH_SEED_ENABLED:-true}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:4200}
      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH:-}
    volumes:
      - ${FIREBASE_CREDENTIALS_PATH:-/dev/null}:/app/firebase-credentials.json:ro
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      # Spring directo al host: emulador Android (10.0.2.2:8080) y teléfono físico (IP_LAN:8080).
      # Nginx sigue siendo la entrada web en :80; esto es solo para clientes móviles / herramientas API.
      - "${BACKEND_HOST_PORT:-8080}:8080"
    networks:
      - tramites-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ─── FastAPI Microservice ─────────────────────────────────
  fastapi:
    container_name: tramites-fastapi
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_NAME: ${FASTAPI_APP_NAME:-tramites-ia-api}
      LOG_LEVEL: ${FASTAPI_LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${FASTAPI_CORS_ORIGINS:-*}
      PORT: ${FASTAPI_PORT:-8000}
      API_PREFIX: ${FASTAPI_API_PREFIX:-/api}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/${MONGO_DB:-tramitesdb}}
      MONGODB_DB: ${MONGO_DB:-tramitesdb}
      MODEL_DIR: ${ML_MODEL_DIR:-/data/models}
      DEFAULT_POLICY_ID: ${DEFAULT_POLICY_ID:-default_policy}
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ml-models:/data/models
    networks:
      - tramites-net
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os,urllib.request; p=os.environ.get('PORT','8000'); urllib.request.urlopen('http://127.0.0.1:'+p+'/health', timeout=5)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s

  # ─── MongoDB (vacío; sin auth en dev para arranque simple) ─
  mongo:
    container_name: tramites-mongo
    image: mongo:7.0
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB:-tramitesdb}
    ports:
      # Para clientes en tu PC (TablePlus, Compass, mongosh): localhost:${MONGO_HOST_PORT:-27017}
      - "${MONGO_HOST_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - tramites-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s

  # ─── Redis ────────────────────────────────────────────────
  redis:
    container_name: tramites-redis
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - tramites-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
