# =============================================================
# Plataforma de Trámites - Docker Compose (desarrollo local)
# Servicios: nginx | frontend | backend | fastapi | mongo | redis
#
# Uso: copia .env.example -> .env y ejecuta: docker compose up -d --build
# =============================================================

networks:
  tramites-net:
    driver: bridge

volumes:
  mongo-data:
  redis-data:

services:

  # ─── Nginx Reverse Proxy ─────────────────────────────────
  nginx:
    container_name: tramites-nginx
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      fastapi:
        condition: service_healthy
    networks:
      - tramites-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Angular Frontend ─────────────────────────────────────
  frontend:
    container_name: tramites-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - tramites-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── Spring Boot Backend ──────────────────────────────────
  backend:
    container_name: tramites-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      # Puerto fijo en la red Docker: debe coincidir con nginx/nginx.conf (upstream springboot).
      SERVER_PORT: "8080"
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/${MONGO_DB:-tramitesdb}}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tramites-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ─── FastAPI Microservice ─────────────────────────────────
  fastapi:
    container_name: tramites-fastapi
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
    networks:
      - tramites-net
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s

  # ─── MongoDB (vacío; sin auth en dev para arranque simple) ─
  mongo:
    container_name: tramites-mongo
    image: mongo:7.0
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB:-tramitesdb}
    volumes:
      - mongo-data:/data/db
    networks:
      - tramites-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s

  # ─── Redis ────────────────────────────────────────────────
  redis:
    container_name: tramites-redis
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - tramites-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
